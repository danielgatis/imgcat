version: 2

before:
  hooks:
    - go mod download

builds:
  - id: default
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin

  - id: snap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - ids:
      - default
    format_overrides:
      - goos: darwin
        formats:
          - zip
      - goos: linux
        formats:
          - tar.gz
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

snapcrafts:
  - name: imgcat
    publish: true
    summary: Display images and gifs in your terminal
    description: Display images and gifs in your terminal
    ids:
      - snap
    apps:
      imgcat:
        command: imgcat
        plugs:
          - home
          - removable-media

brews:
  - name: imgcat
    skip_upload: false
    repository:
      owner: danielgatis
      name: homebrew-imgcat
    url_template: "https://github.com/danielgatis/imgcat/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    description: Display images and gifs in your terminal

scoops:
  - description: Display images and gifs in your terminal
    url_template: "https://github.com/danielgatis/imgcat/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    repository:
      owner: danielgatis
      name: scoop-imgcat
